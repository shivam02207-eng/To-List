<!DOCTYPE html>
<html>
<head>
<title>My To-Do List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>My To-Do List</h1>

<div class="container">

<input type="text" id="taskTitle" placeholder="Enter task">

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button onclick="addTask()">Add Task</button>

<div class="filters">
<button onclick="loadTasks()">All</button>
<button onclick="filterTasks(0)">Active</button>
<button onclick="filterTasks(1)">Completed</button>
</div>

<ul id="taskList"></ul>

<p id="counter"></p>

</div>

<script src="script.js"></script>

</body>
</html>
